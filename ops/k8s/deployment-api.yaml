apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-evaluation-sales-api
  namespace: developer-evaluation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: developer-evaluation-sales-api
  template:
    metadata:
      labels:
        app: developer-evaluation-sales-api
    spec:
      containers:
        - name: sales-api
          image: developer-evaluation-sales-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: developer-evaluation-sales-api-config
            - secretRef:
              name: developer-evaluation-shared-secrets
            - secretRef:
              name: developer-evaluation-sales-db-secret
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
