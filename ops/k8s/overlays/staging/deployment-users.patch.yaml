apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-evaluation-users-api
spec:
  template:
    spec:
      containers:
        - name: users-api
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi