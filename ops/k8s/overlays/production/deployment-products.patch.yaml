apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-evaluation-products-api
spec:
  template:
    spec:
      containers:
        - name: products-api
          image: developer-evaluation-products-api@sha256:__PRODUCTS_API_IMAGE_DIGEST__
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi